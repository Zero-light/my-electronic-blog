<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"/><title>OAuth</title></head>
<body>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var code=p.get('code');
  var provider=p.get('provider');

  if (code) {
    // 第 2 步：GitHub 回调，交换 token
    fetch('https://github.com/login/oauth/access_token',{
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body:JSON.stringify({
        client_id:'Ov23liSUhTF2kk7BXpzb',
        client_secret:'993a743826bb8c791b15d6ec0f88fbb84889affa',
        code:code
      })
    }).then(function(r){return r.json()}).then(function(d){
      if(d.access_token){
        window.opener.postMessage(JSON.stringify({
          token:d.access_token,
          provider:'github',
          backendName:'github'
        }),location.origin);
        document.body.innerHTML='<h2>✅ 登录成功</h2>';
        setTimeout(function(){window.close()},1500);
      }else{
        document.body.innerText='ERR:'+JSON.stringify(d);
      }
    }).catch(function(e){document.body.innerText='ERR:'+e.message});
  } else if (provider) {
    // 第 1 步：CMS 打开回调页，跳转到 GitHub 授权
    location.href='https://github.com/login/oauth/authorize?'+
      'client_id=Ov23liSUhTF2kk7BXpzb'+
      '&scope=repo'+
      '&redirect_uri='+encodeURIComponent('https://www.zerolight.fun/admin/callback.html');
  } else {
    document.body.innerText='ERR: unknown params: '+location.search;
  }
})();
</script>
</body>
</html>
