<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>OAuth 回调 — 零光驿站</title>
</head>
<body>
  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const code = params.get('code');
      const state = params.get('state');

      if (!code) {
        document.body.innerText = '授权失败：缺少 code 参数';
        return;
      }

      try {
        const res = await fetch('https://github.com/login/oauth/access_token', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify({
            client_id: 'Ov23liSUhTF2kk7BXpzb',
            client_secret: '993a743826bb8c791b15d6ec0f88fbb84889affa',
            code: code,
            state: state,
          }),
        });

        const data = await res.json();

        if (data.access_token) {
          // 将 token 传回 CMS 主页面
          const msg = JSON.stringify({
            token: data.access_token,
            provider: 'github',
            backendName: 'github',
          });
          window.opener.postMessage(msg, location.origin);
          document.body.innerHTML = '<h2>✅ 登录成功</h2><p>正在跳转...窗口将自动关闭</p>';
          setTimeout(() => window.close(), 1500);
        } else {
          document.body.innerText = '授权失败：' + JSON.stringify(data);
        }
      } catch (e) {
        document.body.innerText = '网络错误：' + e.message;
      }
    })();
  </script>
</body>
</html>
