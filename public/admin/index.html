<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容管理 — 零光驿站</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #8b949e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .loader { text-align: center; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #484f58;
      border-top-color: #7c9bff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { display: none; color: #e06c75; margin-top: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader">
      <div class="spinner"></div>
      <p>正在加载内容管理系统…</p>
      <p class="error" id="error">
        加载失败，可能是网络问题。
        <br />请尝试：<a href="https://www.zerolight.fun/admin/" style="color:#7c9bff">刷新页面</a>
        <br />或在本地运行：<code>npx decap-server</code>
      </p>
    </div>
  </div>

  <!-- jsDelivr CDN（国内可访问） -->
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3/dist/decap-cms.js"
          onerror="document.getElementById('loading').querySelector('p').textContent='CDN 加载失败，尝试备用源…';var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3/dist/decap-cms.js';s.onerror=function(){document.getElementById('error').style.display='block';document.getElementById('loading').querySelector('p').textContent='加载失败'};document.body.appendChild(s);">
  </script>

  <!-- 加载成功后隐藏 loading -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      }, 2000);
    });
  </script>
</body>
</html>
